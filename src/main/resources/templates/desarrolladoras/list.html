<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Desarrolladoras</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>Gestión de Estudios de Desarrollo</h1>

<a th:href="@{/desarrolladoras/nueva}" style="color: #00d2ff; font-weight: bold;">+ Añadir Nueva Desarrolladora</a>
<br><br>

<table border="1" style="margin: 0 auto; width: 80%; border-collapse: collapse; text-align: center;">
    <thead>
    <tr style="background-color: #2a2a40;">
        <th>ID</th>
        <th>Logo</th>
        <th>Nombre</th>
        <th>País</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="des : ${desarrolladoras}">
        <td th:text="${des.id}">1</td>

        <td>
            <img th:if="${des.imagenUrl != null and !des.imagenUrl.isEmpty()}"
                 th:src="${des.imagenUrl}"
                 style="width: 80px; border-radius: 8px; background-color: white; padding: 5px;"
                 alt="Logo"/>
            <span th:unless="${des.imagenUrl != null and !des.imagenUrl.isEmpty()}"
                  style="color: gray; font-size: 0.8em;">Sin logo</span>
        </td>

        <td th:text="${des.nombre}">Nintendo</td>
        <td th:text="${des.pais}">Japón</td>
        <td>
            <a th:href="@{/desarrolladoras/editar/{id}(id=${des.id})}">✏️ Editar</a> |
            <a th:href="@{/desarrolladoras/borrar/{id}(id=${des.id})}"
               onclick="return confirm('¿Estás seguro de borrar este registro?');">🗑️ Borrar</a>
        </td>
    </tr>
    </tbody>
</table>

<br>
<a th:href="@{/dashboard}">Volver al Dashboard</a>
</body>
</html>
